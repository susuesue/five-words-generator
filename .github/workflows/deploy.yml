name: 自动部署到阿里云

on:
  push:
    branches: [ master ]  # 当推送到master分支时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1️⃣ 拉取代码
        uses: actions/checkout@v3
      
      - name: 2️⃣ SSH连接阿里云并部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            echo "✅ 成功连接到服务器"
            
            # 进入你的项目目录（改成你的实际路径）
            cd /var/www/rag-system/five-words-generator
            
            echo "📦 拉取最新代码"
            git pull origin master
            
            echo "🐍 激活虚拟环境并安装依赖"
            source venv/bin/activate
            pip install -r requirements.txt
            
            echo "🔄 重启应用"
            # 杀掉旧进程
            pkill -f "app_fastapi.py" || true
            
            # 启动新进程
            nohup python src/api/app_fastapi.py > app.log 2>&1 &
            
            echo "✅ 部署完成！应用运行在端口8080"
            echo "🌐 访问地址: http://${{ secrets.ALIYUN_HOST }}:8080"
